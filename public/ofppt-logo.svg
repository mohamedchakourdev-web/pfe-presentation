<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Logo officiel OFPPT — La Voie de l'Avenir">
  <defs>
    <!-- Anneau métallique argenté -->
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="28%" stop-color="#dfe6ee"/>
      <stop offset="55%" stop-color="#b9c4d0"/>
      <stop offset="80%" stop-color="#e6ecf2"/>
      <stop offset="100%" stop-color="#c2ccd7"/>
    </linearGradient>
    <radialGradient id="field" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f3f6fa"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0b1f3a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Badge circulaire -->
  <g filter="url(#softShadow)">
    <circle cx="256" cy="256" r="248" fill="url(#ring)"/>
    <circle cx="256" cy="256" r="226" fill="#f7fafc"/>
    <circle cx="256" cy="256" r="214" fill="url(#field)"/>
    <circle cx="256" cy="256" r="226" fill="none" stroke="#aab6c2" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Trois maillons entrelacés (vert / gris / bleu) -->
  <g transform="translate(256 196)" stroke-linejoin="round" fill="none">
    <!-- vert (gauche) -->
    <rect x="-150" y="-46" width="92" height="92" rx="12" transform="rotate(45 -104 0)" stroke="#2f9e57" stroke-width="30"/>
    <!-- bleu (droite) -->
    <rect x="58" y="-46" width="92" height="92" rx="12" transform="rotate(45 104 0)" stroke="#1f73d0" stroke-width="30"/>
    <!-- gris (centre) — par-dessus, effet de tressage -->
    <rect x="-46" y="-46" width="92" height="92" rx="12" transform="rotate(45 0 0)" stroke="#9aa6b2" stroke-width="30"/>
  </g>

  <!-- Mot-symbole -->
  <text x="256" y="378" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-weight="700"
        font-size="96" letter-spacing="2" fill="#15181c">OFPPT</text>

  <!-- Signature -->
  <text x="256" y="430" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-style="italic"
        font-size="34" letter-spacing="1" fill="#1f6fc4">La Voie de l&apos;Avenir</text>
</svg>
